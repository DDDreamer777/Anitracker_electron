<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; media-src 'self' 'unsafe-inline' file: blob: data:;">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="software-page">
    <div class="top-left-actions">
        <button class="back-button" type="button" aria-label="返回主界面" onclick="window.location.href='home.html'">
            <svg class="back-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M14.71 5.29a1 1 0 0 1 0 1.42L10.42 11l4.29 4.29a1 1 0 1 1-1.42 1.42l-5-5a1 1 0 0 1 0-1.42l5-5a1 1 0 0 1 1.42 0Z" />
            </svg>
        </button>

        <div class="help-hint" aria-label="检测流程指引">
            <button
                class="help-button"
                type="button"
                aria-label="显示检测操作指引"
                aria-describedby="operationGuideTooltip"
            >
                <svg class="help-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 4.4a5.84 5.84 0 0 0-5.85 5.84.95.95 0 0 0 1.9 0A3.95 3.95 0 1 1 12 14.2a.95.95 0 0 0-.95.95v1.65a.95.95 0 1 0 1.9 0v-.82a5.84 5.84 0 0 0-.95-11.58Z" />
                    <circle cx="12" cy="20" r="1.2" />
                </svg>
            </button>
            <div id="operationGuideTooltip" class="guide-tooltip" role="tooltip">
                <h4>检测流程</h4>
                <ul class="guide-steps">
                    <li><span class="guide-step-index">01</span><span>先选择待处理视频，再选择右侧输入目录。</span></li>
                    <li><span class="guide-step-index">02</span><span>按阶段进入预处理、检测追踪或智能分析。</span></li>
                    <li><span class="guide-step-index">03</span><span>预处理完成后，文件浏览区会自动切到新的输出目录。</span></li>
                    <li><span class="guide-step-index">04</span><span>检测追踪运行时，可在阶段面板中查看状态并终止任务。</span></li>
                    <li><span class="guide-step-index">05</span><span>智能分析完成后，可使用左上角工具抽屉导出结果。</span></li>
                    <li><span class="guide-step-index">06</span><span>底部日志区会持续记录执行进度与错误反馈。</span></li>
                </ul>
            </div>
        </div>

        <div class="toolbox-hint" aria-label="工具抽屉">
            <button
                id="toolDrawerToggleBtn"
                class="toolbox-button"
                type="button"
                aria-label="展开工具抽屉"
                aria-expanded="false"
                aria-controls="toolDrawerPanel"
            >
                <svg class="toolbox-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M21.72 12.58a6.27 6.27 0 0 1-7.79.69l-8.6 8.6a2.2 2.2 0 0 1-3.11-3.11l8.61-8.6a6.27 6.27 0 0 1 6.95-10.02l-2.73 2.73a2.17 2.17 0 0 0 3.07 3.07l2.73-2.73a6.27 6.27 0 0 1 .87 9.37z" />
                </svg>
            </button>

            <div id="toolDrawerPanel" class="tool-drawer" aria-hidden="true">
                <button id="openPreprocessBtn" class="tool-drawer-btn" onclick="openPreprocessFolder()">打开预处理目录</button>
                <button id="openResultsBtn" class="tool-drawer-btn" onclick="openResultsFolder()">打开结果目录</button>
                <button id="saveAsBtn" class="tool-drawer-btn" onclick="saveResultsAs()">另存为</button>
                <button id="aiSummaryBtn" class="tool-drawer-btn" onclick="saveResultsAs()">AI智能分析</button>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <div class="video-player is-empty" id="videoPlayerShell1">
            <video id="video1" controls></video>
            <div class="video-empty-state" aria-hidden="true">
                
                <span class="video-empty-title">选择视频文件以预览(ゝ∀･)</span>
                
            </div>
            <div class="controls">
                <button onclick="selectVideo(1)">选择视频</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="file-browser">
                <div class="file-browser-header">
                    <div class="folder-meta">
                        <span class="folder-label">
                            <span class="folder-label-dot" aria-hidden="true"></span>
                            当前工作目录
                        </span>
                        <span class="folder-source-tag">输入源</span>
                    </div>
                    <button class="folder-select-btn" onclick="selectFolder(1)">选择文件夹</button>
                </div>
                <div id="folderPathShell1" class="folder-path-shell is-empty">
                    <div id="folderPath1" class="folder-path"></div>
                </div>
                <div id="fileListRegion1" class="file-list-region is-collapsed" aria-hidden="true">
                    <div class="file-browser-divider" role="separator"></div>
                    <div id="fileList1" class="file-list"></div>
                </div>
            </div>

            <div class="python-controls stage-workspace" id="stageWorkspace" data-stage-mode="overview">
                <div class="stage-workspace-header">
                    <div class="stage-workspace-copy">
                        <h3>智析</h3>
                    </div>
                    <div id="stageGlobalStatus" class="stage-global-status" data-tone="idle">
                        <span class="stage-global-status-label">当前运行</span>
                        <span class="stage-global-status-value">无</span>
                    </div>
                </div>

                <div class="stage-workspace-body">
                    <div class="stage-overview-shell">
                        <div class="stage-overview-illustration" aria-hidden="true">
                            <img class="stage-overview-fish-image" src="assets/figures/fish3.png" alt="" />
                        </div>
                        <div id="stageRail" class="stage-rail" aria-label="阶段选择器">
                            <button class="stage-selector-btn" type="button" data-stage-select="preprocess">
                                <span class="stage-selector-main">预处理</span>
                                <span class="stage-selector-meta">待选择输入</span>
                            </button>
                            <div class="stage-flow-arrow" aria-hidden="true">
                                <span class="stage-flow-arrow-line"></span>
                                <span class="stage-flow-arrow-head"></span>
                            </div>
                            <button class="stage-selector-btn" type="button" data-stage-select="detection">
                                <span class="stage-selector-main">检测追踪</span>
                                <span class="stage-selector-meta">待选择输入</span>
                            </button>
                            <div class="stage-flow-arrow" aria-hidden="true">
                                <span class="stage-flow-arrow-line"></span>
                                <span class="stage-flow-arrow-head"></span>
                            </div>
                            <button class="stage-selector-btn" type="button" data-stage-select="analysis">
                                <span class="stage-selector-main">智能分析</span>
                                <span class="stage-selector-meta">待选择输入</span>
                            </button>
                        </div>
                    </div>

                    <section id="stageDetailPanel" class="stage-detail-panel" aria-live="polite" hidden>
                        <button id="stageBackBtn" class="stage-back-btn" type="button">&larr; 返回阶段选择</button>
                        <p id="stageDetailDescription" class="stage-detail-description">展开后会在这里显示该阶段的状态、依赖与操作。</p>

                        <div id="stageMetaList" class="stage-meta-list"></div>

                        <div class="stage-action-row">
                            <button id="startPreprocessBtn" class="stage-action-btn" onclick="executePythonScript('preprocess')">开始预处理</button>
                            <button id="startDetectionBtn" class="stage-action-btn" onclick="executePythonScript('detection')">启动检测</button>
                            <button id="startAnalysisBtn" class="stage-action-btn" onclick="executePythonScript('analysis')">启动分析</button>
                            <button id="stopScriptBtn" class="stage-action-btn stage-action-btn-danger" onclick="stopPythonScript()" disabled>终止当前进程</button>
                        </div>
                    </section>
                </div>

                <input type="hidden" id="scriptArgs" value="">
                <input type="hidden" id="analysisScriptArgs" value="">
            </div>
        </div>

        <div id="output"></div>
    </div>

    <script src="stage-definition.js"></script>
    <script src="runtime-state.js"></script>
    <script src="stage-controls.js"></script>
    <script src="file-list-visibility.js"></script>
    <script src="renderer/log-console.js"></script>
    <script src="renderer/runtime-client.js"></script>
    <script src="renderer/media-preview.js"></script>
    <script src="renderer/file-browser.js"></script>
    <script src="renderer/stage/stage-controller.js"></script>
    <script src="renderer/app-controller.js"></script>
    <script src="renderer.js"></script>
    <script src="stage-workspace.js"></script>
</body>
</html>
